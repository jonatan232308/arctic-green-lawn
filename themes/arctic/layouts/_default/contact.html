{{ define "main" }}
<div class="contact-section">
  <h1>Get In Touch</h1>
  <p class="subtitle">Ready to transform your outdoor space? Reach out for a free consultation or quote.</p>

  <div id="form-thanks" style="display:none; margin:1.5rem 0; padding:1rem 1.25rem; background:#e8f5e9; border-left:4px solid var(--green-700, #2e7d32); border-radius:6px; color:#1b5e20; font-weight:500;">
    Thanks! We got your message and will be in touch shortly.
  </div>
  <script>
    if (new URLSearchParams(window.location.search).get('sent') === '1') {
      document.getElementById('form-thanks').style.display = 'block';
      {{ with .Site.Params.googleAdsLeadLabel }}
      if (typeof gtag === 'function') {
        gtag('event', 'conversion', {'send_to': '{{ . }}'});
      }
      {{ end }}
    }
  </script>

  <div class="contact-info">
    <div class="contact-item">
      <div class="label">Phone</div>
      <div class="value"><a href="tel:{{ .Site.Params.phoneRaw }}">{{ .Site.Params.phone }}</a></div>
    </div>
    <div class="contact-item">
      <div class="label">Email</div>
      <div class="value"><a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a></div>
    </div>
  </div>

  <div class="contact-form">
    <h2>Send Us a Message</h2>
    <form id="contactForm" action="https://arctic-green-voice-caller.fly.dev/form-submit" method="POST" onsubmit="return validateContact(this)">
      <input type="hidden" name="redirect" value="https://arcticgreenlandscaping.com/contact/?sent=1">
      <input type="checkbox" name="botcheck" style="display:none" tabindex="-1" autocomplete="off">
      <div style="position:absolute;left:-10000px;top:auto;width:1px;height:1px;overflow:hidden" aria-hidden="true">
        <label>Website (leave blank)</label>
        <input type="text" name="website" tabindex="-1" autocomplete="off">
        <label>Company URL (leave blank)</label>
        <input type="url" name="url" tabindex="-1" autocomplete="off">
      </div>
      <input type="hidden" name="form_loaded_at" id="form_loaded_at" value="">
      <div class="form-group">
        <label for="name">Name *</label>
        <input type="text" id="name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email *</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone">
      </div>
      <div class="form-group">
        <label for="service">Service Interested In</label>
        <select id="service" name="service">
          <option value="">-- Select a service --</option>
          <option value="Free Consultation">Free In-Home Consultation</option>
          <option value="Lawn Mowing">Lawn Mowing & Maintenance</option>
          <option value="Spring/Fall Cleanup">Spring & Fall Cleanup</option>
          <option value="Landscape Design">Landscape Design Consultation</option>
          <option value="Irrigation Check">Irrigation System Check</option>
          <option value="Tree Trimming">Tree & Shrub Trimming</option>
        </select>
      </div>
      <div class="form-group">
        <label for="message">Message *</label>
        <textarea id="message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
    <script>
      (function(){
        var loadedAt = Date.now();
        var ts = document.getElementById('form_loaded_at');
        if (ts) ts.value = String(loadedAt);
      })();
      function validateContact(form){
        var hp1 = form.querySelector('input[name="website"]');
        var hp2 = form.querySelector('input[name="url"]');
        var bc  = form.querySelector('input[name="botcheck"]');
        if ((hp1 && hp1.value) || (hp2 && hp2.value) || (bc && bc.checked)) {
          return false;
        }
        var loadedAt = parseInt(form.querySelector('input[name="form_loaded_at"]').value || '0', 10);
        if (!loadedAt || (Date.now() - loadedAt) < 3000) {
          return false;
        }
        var name = (form.querySelector('input[name="name"]').value || '').trim();
        var msg  = (form.querySelector('textarea[name="message"]').value || '').trim();
        var spamRe = /\b(robertjak|robertjax|robertdup|williejak|stevenjak|jamesvon|kevinhew)\b/i;
        var urlCount = (msg.match(/https?:\/\//gi) || []).length;
        var cyrillic = /[Ѐ-ӿ]/.test(name + ' ' + msg);
        if (spamRe.test(name) || urlCount >= 2 || cyrillic) {
          return false;
        }
        return true;
      }
    </script>
  </div>
</div>
{{ end }}
